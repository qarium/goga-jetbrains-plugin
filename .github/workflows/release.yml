name: Release Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1

      - name: Validate tag
        id: validate_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"

          if [[ ! "${tag_name}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9]+\.[0-9]+)?$ ]]; then
            echo "Invalid release tag: ${tag_name}" >&2
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

          if [[ "${tag_name}" =~ -[A-Za-z0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check and build plugin
        run: ./gradlew check buildPlugin

      - name: Locate plugin ZIP
        id: locate_zip
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          zips=(build/distributions/*.zip)

          if (( ${#zips[@]} == 0 )); then
            echo "No ZIP found in build/distributions" >&2
            exit 1
          fi

          if (( ${#zips[@]} > 1 )); then
            printf 'Expected exactly one ZIP, found %d:\n' "${#zips[@]}" >&2
            printf '%s\n' "${zips[@]}" >&2
            exit 1
          fi

          zip_path="${zips[0]}"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.validate_tag.outputs.tag_name }}
          name: ${{ steps.validate_tag.outputs.tag_name }}
          prerelease: ${{ steps.validate_tag.outputs.prerelease }}
          files: ${{ steps.locate_zip.outputs.zip_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
